services:
  mysql:
    image: mysql:8.4
    container_name: enrollment-mysql
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: enrollment_db
      MYSQL_USER: enrollment_user
      MYSQL_PASSWORD: enrollment_password
      MYSQL_ROOT_PASSWORD: root_password
      TZ: Asia/Seoul

    ports:
      - "13306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot_password"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: enrollment-app
    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Seoul

    ports:
      - "8080:8080"

volumes:
  mysql-data: